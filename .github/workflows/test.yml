name: Test Action
on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        id: vng
        with:
          name: test-kernel
          kernel-url: https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
          kernel-tag: v6.12
          version: build-${{ github.run_id }}
          run: |
            uname -r
            echo "Hello from inside the VM"
            echo "vng-marker" > "$GITHUB_WORKSPACE/.vng-test-marker"
            echo "rw-vm-marker" > "$(dirname "$GITHUB_STEP_SUMMARY")/.vng-rw-marker"

      - name: Verify outputs
        run: |
          test -n "${{ steps.vng.outputs.kernel-sha }}"
          echo "kernel-sha: ${{ steps.vng.outputs.kernel-sha }}"

      - name: Verify workspace write from VM
        run: |
          grep -q "vng-marker" .vng-test-marker || { echo "::error::workspace write not persisted from VM"; exit 1; }

      - name: Verify file command dir writable from VM
        run: |
          MARKER="$(dirname "$GITHUB_STEP_SUMMARY")/.vng-rw-marker"
          grep -q "rw-vm-marker" "$MARKER" || { echo "::error::marker in file command dir not persisted from VM"; exit 1; }

      - name: Verify vmlinux.h
        run: |
          test -f linux/vmlinux.h || { echo "::error::vmlinux.h not found in cached kernel tree"; exit 1; }
          test -s linux/vmlinux.h || { echo "::error::vmlinux.h is empty"; exit 1; }
          echo "vmlinux.h: $(wc -c < linux/vmlinux.h) bytes"

  restore:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore kernel SHA from build job
        uses: actions/cache/restore@v5
        with:
          path: .vng-sha-test-kernel
          key: vng-sha-test-kernel-v6.12-${{ github.run_id }}

      - name: Verify SHA propagation
        id: sha
        run: |
          SHA=$(cat .vng-sha-test-kernel/sha 2>/dev/null || echo "")
          test -n "$SHA" || { echo "::error::SHA not propagated from build job"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Verify kernel cache exists
        uses: actions/cache/restore@v5
        id: cache-check
        with:
          path: linux
          key: vng-kernel-test-kernel-${{ runner.arch }}-${{ steps.sha.outputs.sha }}-build-${{ github.run_id }}
          lookup-only: true

      - name: Fail on cache miss
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          echo "::error::Kernel build cache not found — build job did not populate cache"
          exit 1

      - uses: ./
        id: vng
        with:
          name: test-kernel
          kernel-url: https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
          kernel-tag: v6.12
          version: build-${{ github.run_id }}
          run: |
            uname -r
            echo "Cross-job cache hit test"

      - name: Verify vmlinux.h survives cache
        run: |
          test -f linux/vmlinux.h || { echo "::error::vmlinux.h not restored from cache"; exit 1; }
          echo "vmlinux.h restored: $(wc -c < linux/vmlinux.h) bytes"

  build-arm:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        id: vng
        with:
          name: test-kernel-arm
          kernel-url: https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
          kernel-tag: v6.12
          version: build-${{ github.run_id }}
          run: |
            uname -r
            echo "Hello from inside the VM"

      - name: Verify outputs
        run: |
          test -n "${{ steps.vng.outputs.kernel-sha }}"
          echo "kernel-sha: ${{ steps.vng.outputs.kernel-sha }}"

  build-ro-workspace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./
        id: vng
        with:
          name: test-kernel
          kernel-url: https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git
          kernel-tag: v6.12
          version: build-${{ github.run_id }}
          workspace-rw: false
          run: |
            uname -r
            echo "ro-vm-marker" > "$(dirname "$GITHUB_STEP_SUMMARY")/.vng-ro-marker"

      - name: Verify file command dir writable from ro-workspace VM
        run: |
          MARKER="$(dirname "$GITHUB_STEP_SUMMARY")/.vng-ro-marker"
          grep -q "ro-vm-marker" "$MARKER" || { echo "::error::marker in file command dir not persisted from ro-workspace VM"; exit 1; }

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck scripts/*.sh
